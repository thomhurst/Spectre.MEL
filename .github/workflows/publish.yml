name: publish

on:
  workflow_dispatch:
    inputs:
      push:
        description: 'Push the package to GitHub Packages'
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3.1.11
        with:
          versionSpec: '6.x'

      - name: Determine version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v3.1.11

      - name: Restore
        run: dotnet restore

      - name: Build
        run: >-
          dotnet build --configuration Release --no-restore
          -p:Version=${{ steps.gitversion.outputs.assemblySemVer }}
          -p:FileVersion=${{ steps.gitversion.outputs.assemblySemFileVer }}
          -p:InformationalVersion=${{ steps.gitversion.outputs.informationalVersion }}

      - name: Test
        run: >-
          dotnet run --project tests/Spectre.MEL.Tests/Spectre.MEL.Tests.csproj
          --configuration Release --no-build
          -- --treenode-filter "/**"

      - name: Pack
        run: >-
          dotnet pack src/Spectre.MEL/Spectre.MEL.csproj
          --configuration Release --no-build
          -p:PackageVersion=${{ steps.gitversion.outputs.semVer }}
          --output ./artifacts

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nupkg-${{ steps.gitversion.outputs.semVer }}
          path: ./artifacts/*.*nupkg

      - name: Push to GitHub Packages
        if: ${{ inputs.push }}
        run: >-
          dotnet nuget push "./artifacts/*.nupkg"
          --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          --api-key ${{ secrets.GITHUB_TOKEN }}
          --skip-duplicate
