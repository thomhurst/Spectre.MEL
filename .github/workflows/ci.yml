name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet run --project tests/MEL.Spectre.Tests/MEL.Spectre.Tests.csproj --configuration Release --no-build -- --treenode-filter "/**" --report-trx

      - name: Pack
        if: matrix.os == 'ubuntu-latest'
        run: dotnet pack src/MEL.Spectre/MEL.Spectre.csproj --configuration Release --no-build --output ./artifacts

      - name: Upload package
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: ./artifacts/*.nupkg
